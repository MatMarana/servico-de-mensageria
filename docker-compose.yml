services:
# -------------- BROKER ---------
  broker:
    build:
      context: .
      dockerfile: Dockerfile-python
    container_name: broker
    volumes:
      - ./broker/broker.py:/app/main.py
    ports:
      - 5555:5555
      - 5556:5556


# ------------- PROXY -----------
  proxy:
    build:
      context: .
      dockerfile: Dockerfile-python
    container_name: proxy
    volumes:
      - ./proxy/proxy.py:/app/main.py
    ports:
      - 5557:5557
      - 5558:5558

