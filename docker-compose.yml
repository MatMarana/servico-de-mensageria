# -------- RUBY -----------
  servidor-ruby:
     build:
       context: .
       dockerfile: Dockerfile-ruby
     volumes:
       - ./codigo-ruby/servidor.rb:/app/main.rb
     depends_on:
       - broker
       - proxy

  cliente-ruby:
    build:
      context: .
      dockerfile: Dockerfile-ruby
    image: cliente_ruby:gemzmq
    volumes:
      - ./codigo-ruby/cliente.rb:/app/main.rb
    depends_on:
      - servidor-ruby

